name: build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_framework: net48
            dnspy_ref: v6.5.1
          - target_framework: net10.0-windows
            dnspy_ref: master

    steps:
      - name: Checkout extension repository
        uses: actions/checkout@v4
        with:
          path: extension-src

      - name: Checkout dnSpyEx source tree
        uses: actions/checkout@v4
        with:
          repository: dnSpyEx/dnSpy
          ref: ${{ matrix.dnspy_ref }}
          submodules: recursive
          path: dnspy-src

      - name: Checkout HoLLy Echo dependency
        uses: actions/checkout@v4
        with:
          repository: holly-hacker/dnSpy.Extension.HoLLy
          submodules: recursive
          path: dnspy-src/Extensions/dnSpy.Extension.HoLLy

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Overlay forked extension into dnSpy source tree
        shell: pwsh
        run: |
          $target = Join-Path $PWD 'dnspy-src/Extensions/dnSpy.MCP.Server'
          if (Test-Path $target) {
            Remove-Item $target -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          Copy-Item (Join-Path $PWD 'extension-src/*') $target -Recurse -Force

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore dnspy-src/Extensions/dnSpy.MCP.Server/dnSpy.MCP.Server.csproj
          dotnet restore extension-src/tools/dnSpy.MCP.StdioProxy/dnSpy.MCP.StdioProxy.csproj

      - name: Build ${{ matrix.target_framework }}
        shell: pwsh
        run: |
          dotnet build dnspy-src/Extensions/dnSpy.MCP.Server/dnSpy.MCP.Server.csproj `
            -c Release `
            -f ${{ matrix.target_framework }} `
            --no-restore
          dotnet build extension-src/tools/dnSpy.MCP.StdioProxy/dnSpy.MCP.StdioProxy.csproj `
            -c Release `
            --no-restore

      - name: Package build output
        shell: pwsh
        run: |
          $allDlls = Get-ChildItem dnspy-src -Recurse -Filter 'dnSpy.MCP.Server.x.dll'
          $dll = $allDlls |
            Where-Object { $_.FullName -match [regex]::Escape("${{ matrix.target_framework }}") } |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1

          if (-not $dll) {
            $dll = $allDlls |
              Sort-Object LastWriteTimeUtc -Descending |
              Select-Object -First 1
          }

          if (-not $dll) {
            throw "dnSpy.MCP.Server.x.dll for target ${{ matrix.target_framework }} was not found."
          }

          Write-Host "Packaging MCP DLL from: $($dll.FullName)"

          $outDir = $dll.Directory.FullName
          $artifactDir = Join-Path $PWD "artifacts/${{ matrix.target_framework }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $includePatterns = @(
            'dnSpy.MCP.Server.x.dll',
            'dnSpy.MCP.Server.x.pdb',
            'mcp-config.json',
            'AssemblyData.dll',
            'de4dot*.dll',
            'Echo*.dll',
            'Echo*.pdb',
            'Echo*.xml'
          )

          foreach ($pattern in $includePatterns) {
            Get-ChildItem -Path $outDir -Filter $pattern -File -ErrorAction SilentlyContinue |
              Copy-Item -Destination $artifactDir -Force
          }

          $proxyOutDir = Join-Path $PWD 'extension-src/tools/dnSpy.MCP.StdioProxy/bin/Release/net48'
          if (Test-Path $proxyOutDir) {
            $proxyArtifactDir = Join-Path $artifactDir 'stdio-proxy'
            New-Item -ItemType Directory -Force -Path $proxyArtifactDir | Out-Null
            $proxyPatterns = @(
              'dnSpy.MCP.StdioProxy.exe',
              'dnSpy.MCP.StdioProxy.pdb',
              'dnSpy.MCP.StdioProxy.exe.config',
              'Run-dnSpy-MCP-Stdio-Proxy.cmd'
            )
            foreach ($pattern in $proxyPatterns) {
              Get-ChildItem -Path $proxyOutDir -Filter $pattern -File -ErrorAction SilentlyContinue |
                Copy-Item -Destination $proxyArtifactDir -Force
            }
            Copy-Item 'extension-src/tools/dnSpy.MCP.StdioProxy/Run-dnSpy-MCP-Stdio-Proxy.cmd' -Destination $proxyArtifactDir -Force
          }

          @"
          Copy these files into dnSpy's bin folder.
          This package intentionally excludes dnSpy host binaries and broad transitive dependencies.
          Do not overwrite dnSpy.exe.config or replace the whole dnSpy directory with this zip.
          Optional stdio bridge is under stdio-proxy/ and forwards stdio MCP traffic to the local HTTP endpoint.
          "@ | Set-Content -Path (Join-Path $artifactDir 'INSTALL.txt') -Encoding UTF8

          $zipPath = Join-Path $PWD "artifacts/dnSpy.MCP.Server-${{ matrix.target_framework }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $artifactDir '*') -DestinationPath $zipPath

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnSpy.MCP.Server-${{ matrix.target_framework }}
          path: artifacts/dnSpy.MCP.Server-${{ matrix.target_framework }}.zip
          if-no-files-found: error
