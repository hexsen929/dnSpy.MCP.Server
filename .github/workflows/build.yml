name: build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_framework: net8.0-windows
            dnspy_ref: v6.5.1
            host_package: dnSpyEx v6.5.1 / official dnSpy-net-win64 host
            host_line: primary
          - target_framework: net48
            dnspy_ref: v6.5.1
            host_package: dnSpyEx v6.5.1 / official dnSpy-netframework host
            host_line: compatibility

    steps:
      - name: Checkout extension repository
        uses: actions/checkout@v4
        with:
          path: extension-src

      - name: Checkout dnSpyEx source tree
        uses: actions/checkout@v4
        with:
          repository: dnSpyEx/dnSpy
          ref: ${{ matrix.dnspy_ref }}
          submodules: recursive
          path: dnspy-src

      - name: Checkout HoLLy Echo dependency
        uses: actions/checkout@v4
        with:
          repository: holly-hacker/dnSpy.Extension.HoLLy
          submodules: recursive
          path: dnspy-src/Extensions/dnSpy.Extension.HoLLy

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Overlay forked extension into dnSpy source tree
        shell: pwsh
        run: |
          $target = Join-Path $PWD 'dnspy-src/Extensions/dnSpy.MCP.Server'
          if (Test-Path $target) {
            Remove-Item $target -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          Copy-Item (Join-Path $PWD 'extension-src/*') $target -Recurse -Force

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore dnspy-src/Extensions/dnSpy.MCP.Server/dnSpy.MCP.Server.csproj
          dotnet restore extension-src/tools/dnSpy.MCP.StdioProxy/dnSpy.MCP.StdioProxy.csproj

      - name: Build ${{ matrix.target_framework }}
        shell: pwsh
        run: |
          dotnet build dnspy-src/Extensions/dnSpy.MCP.Server/dnSpy.MCP.Server.csproj `
            -c Release `
            -f ${{ matrix.target_framework }} `
            --no-restore

          $proxyOutDir = Join-Path $PWD "pack-out/${{ matrix.target_framework }}/stdio-proxy"
          New-Item -ItemType Directory -Force -Path $proxyOutDir | Out-Null
          dotnet build extension-src/tools/dnSpy.MCP.StdioProxy/dnSpy.MCP.StdioProxy.csproj `
            -c Release `
            -p:OutputPath="$proxyOutDir/" `
            -p:AppendTargetFrameworkToOutputPath=false `
            -p:AppendRuntimeIdentifierToOutputPath=false `
            --no-restore

      - name: Package build output
        shell: pwsh
        run: |
          $preferredBuildOutDir = Join-Path $PWD "dnspy-src/dnSpy/dnSpy/bin/Release/${{ matrix.target_framework }}/Extensions/dnSpy.MCP.Server"
          if (Test-Path $preferredBuildOutDir) {
            $dll = Get-ChildItem -Path $preferredBuildOutDir -Filter 'dnSpy.MCP.Server.x.dll' -File -ErrorAction SilentlyContinue |
              Select-Object -First 1
          }

          if (-not $dll) {
            # --- Fallback: locate the MCP DLL from wherever MSBuild actually placed it ---
            $dll = Get-ChildItem 'dnspy-src' -Recurse -Filter 'dnSpy.MCP.Server.x.dll' -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.FullName -notmatch '[\\/]obj[\\/]' -and
                $_.FullName -match [regex]::Escape("${{ matrix.target_framework }}")
              } |
              Sort-Object LastWriteTimeUtc -Descending |
              Select-Object -First 1
          }

          if (-not $dll) {
            throw "dnSpy.MCP.Server.x.dll for target ${{ matrix.target_framework }} was not found."
          }

          $buildOutDir = $dll.Directory.FullName
          Write-Host "Found MCP DLL at: $($dll.FullName)"

          $artifactDir = Join-Path $PWD "artifacts/${{ matrix.target_framework }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $pluginDir = Join-Path $artifactDir 'Extensions/dnSpy.MCP.Server'
          New-Item -ItemType Directory -Force -Path $pluginDir | Out-Null

          # --- Collect MCP extension files from the build output directory ---
          $includePatterns = @(
            'dnSpy.MCP.Server.x.dll',
            'dnSpy.MCP.Server.x.pdb',
            'mcp-config.json',
            'AssemblyData.dll',
            'de4dot*.dll',
            'Echo*.dll',
            'Echo*.pdb',
            'Echo*.xml'
          )

          foreach ($pattern in $includePatterns) {
            Get-ChildItem -Path $buildOutDir -Filter $pattern -File -ErrorAction SilentlyContinue |
              Copy-Item -Destination $pluginDir -Force
          }

          # --- Collect stdio-proxy files ---
          $proxyOutDir = Join-Path $PWD "pack-out/${{ matrix.target_framework }}/stdio-proxy"
          if (Test-Path $proxyOutDir) {
            $proxyArtifactDir = Join-Path $pluginDir 'stdio-proxy'
            New-Item -ItemType Directory -Force -Path $proxyArtifactDir | Out-Null
            $proxyPatterns = @(
              'dnSpy.MCP.StdioProxy.exe',
              'dnSpy.MCP.StdioProxy.pdb',
              'dnSpy.MCP.StdioProxy.exe.config',
              'Run-dnSpy-MCP-Stdio-Proxy.cmd'
            )
            foreach ($pattern in $proxyPatterns) {
              Get-ChildItem -Path $proxyOutDir -Recurse -Filter $pattern -File -ErrorAction SilentlyContinue |
                Copy-Item -Destination $proxyArtifactDir -Force
            }
            Copy-Item 'extension-src/tools/dnSpy.MCP.StdioProxy/Run-dnSpy-MCP-Stdio-Proxy.cmd' -Destination $proxyArtifactDir -Force
          }

          @"
          Extract this zip into dnSpy's bin folder.
          Resulting layout: bin/Extensions/dnSpy.MCP.Server/*
          Preferred host package for this artifact: ${{ matrix.host_package }} (${{ matrix.host_line }} line).
          This package intentionally excludes dnSpy host binaries and broad transitive dependencies.
          Do not overwrite dnSpy.exe.config or replace the whole dnSpy directory with this zip.
          Optional stdio bridge is under Extensions/dnSpy.MCP.Server/stdio-proxy/ and forwards stdio MCP traffic to the local HTTP endpoint.
          "@ | Set-Content -Path (Join-Path $artifactDir 'INSTALL.txt') -Encoding UTF8

          $zipPath = Join-Path $PWD "artifacts/dnSpy.MCP.Server-${{ matrix.target_framework }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $artifactDir '*') -DestinationPath $zipPath

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnSpy.MCP.Server-${{ matrix.target_framework }}
          path: artifacts/dnSpy.MCP.Server-${{ matrix.target_framework }}.zip
          if-no-files-found: error
